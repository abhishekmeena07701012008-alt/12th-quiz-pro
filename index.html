<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Quiz Pro</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e2937; --success: #22c55e; --wrong: #ef4444; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .option-btn { background: #f1f5f9; color: var(--text); text-align: left; border: 2px solid #e2e8f0; }
        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ 12th Quiz Pro ✨</h1>
        <div id="lang-screen"><button class="btn" onclick="selectLanguage('hi')">हिंदी माध्यम</button><button class="btn" onclick="selectLanguage('en')">English Medium</button></div>
        <div id="stream-screen" class="hidden"><button class="btn" onclick="selectStream('science')">विज्ञान</button><button class="btn" onclick="selectStream('commerce')">वाणिज्य</button><button class="btn" onclick="selectStream('arts')">कला</button></div>
        <div id="subject-screen" class="hidden"><div id="subjects-container"></div></div>
        <div id="quiz-screen" class="hidden"><h3 id="question-text"></h3><div id="options-container"></div></div>
        <div id="result-screen" class="hidden"><h2 id="score-display"></h2><button class="btn" onclick="location.reload()">दोबारा खेलें</button></div>
    </div>

    <script src="history (1).js"></script>
    <script src="app.js"></script>
</body>
</html>
