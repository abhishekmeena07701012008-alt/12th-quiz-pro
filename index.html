<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>12th Quiz Pro</title>
</head>
<body>
    <div class="card" id="main-container">
        <div id="lang-screen">
            <h1>Select Language</h1>
            <button class="btn" onclick="setLanguage('hi')">हिंदी माध्यम (Hindi)</button>
            <button class="btn" onclick="setLanguage('en')">English Medium</button>
        </div>

        <div id="subject-screen" class="hidden">
            <h1>Select Subject</h1>
            <div id="subjects-container"></div>
        </div>

        <div id="quiz-screen" class="hidden">
            <h3 id="subject-tag"></h3>
            <h2 id="question"></h2>
            <div id="options"></div>
        </div>

        <div id="report" class="hidden">
            <h2>📊 Report Card</h2>
            <h1 id="score-text"></h1>
            <button class="retry-btn" onclick="location.reload()">Restart</button>
        </div>
    </div>
    <script src="history (1).js"></script>
    <script src="app.js"></script>
</body>
</html>
