<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Quiz Pro</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: #fff; width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        @media(min-width: 500px) { .app-container { min-height: 80vh; border-radius: 15px; margin: 20px; } }
        
        h1, h2, h3 { text-align: center; color: #2c3e50; }
        .hidden { display: none !important; }
        
        .screen { display: flex; flex-direction: column; flex-grow: 1; justify-content: center; }
        .btn { padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; background-color: #3498db; color: white; font-weight: bold; }
        .btn:hover { background-color: #2980b9; }
        
        .btn-science { background-color: #9b59b6; }
        .btn-commerce { background-color: #e67e22; }
        .btn-arts { background-color: #e74c3c; }
        .btn-back { background-color: #7f8c8d; margin-top: 20px; }
        
        /* Quiz Screen Styles */
        .header-info { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px; color: #555; }
        .question-box { font-size: 18px; margin-bottom: 20px; line-height: 1.5; font-weight: bold; }
        .options-container { display: flex; flex-direction: column; }
        .option-btn { background-color: #ecf0f1; color: #333; text-align: left; }
        .option-btn:hover { background-color: #bdc3c7; }
        .option-btn.correct { background-color: #2ecc71 !important; color: white; }
        .option-btn.wrong { background-color: #e74c3c !important; color: white; }
        .option-btn:disabled { cursor: not-allowed; }
        
        .next-btn { background-color: #2c3e50; margin-top: 20px; }
        
        /* Result Screen */
        .result-box { text-align: center; }
        .score-text { font-size: 48px; font-weight: bold; color: #2ecc71; margin: 20px 0; }
        .remark-text { font-size: 18px; color: #555; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="lang-screen" class="screen">
        <h1>12th Quiz Pro</h1>
        <h2>Select Language / भाषा चुनें</h2>
        <button class="btn" onclick="selectLanguage('en')">English</button>
        <button class="btn" onclick="selectLanguage('hi')">हिन्दी</button>
    </div>

    <div id="stream-screen" class="screen hidden">
        <h2 id="stream-title">Select your Stream:</h2>
        <button class="btn btn-science" onclick="selectStream('science')">Science</button>
        <button class="btn btn-commerce" onclick="selectStream('commerce')">Commerce</button>
        <button class="btn btn-arts" onclick="selectStream('arts')">Arts</button>
        <button class="btn btn-back" onclick="restartQuiz()">⬅ Back</button>
    </div>

    <div id="subject-screen" class="screen hidden">
        <h2 id="subject-title">Select your Subject:</h2>
        <div id="subjects-container" style="display: flex; flex-direction: column;"></div>
        <button class="btn btn-back" onclick="backToStreams()">⬅ Back</button>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="header-info">
            <span id="progress">Question: 1 / 20</span>
            <span id="timer">⏱️ 20s</span>
        </div>
        <div class="question-box" id="question-text">Loading question...</div>
        <div class="options-container" id="options-container"></div>
        <button id="next-btn" class="btn next-btn hidden" onclick="nextQuestion()">Next Question ➡</button>
    </div>

    <div id="result-screen" class="screen hidden result-box">
        <h2>Quiz Completed!</h2>
        <div class="score-text" id="score-display">0 / 20</div>
        <div class="remark-text" id="remark">Great effort!</div>
        <button class="btn" onclick="restartQuiz()">🏠 Home / होम</button>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
