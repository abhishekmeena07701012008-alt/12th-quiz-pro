<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Quiz Pro</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f3f4f6;
            --science: #0ea5e9;
            --commerce: #f59e0b;
            --arts: #ec4899;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 580px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 20px; font-size: 24px; }
        .btn { display: block; width: 100%; padding: 14px; margin: 12px 0; border: none; border-radius: 8px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-science { background: var(--science); }
        .btn-commerce { background: var(--commerce); }
        .btn-arts { background: var(--arts); }
        
        .option-btn { background: #e5e7eb; color: var(--dark); text-align: left; font-weight: normal; margin: 8px 0; padding: 14px; }
        .option-btn:hover { background: #d1d5db; }
        .correct { background: var(--success) !important; color: white; font-weight: bold; }
        .wrong { background: var(--danger) !important; color: white; font-weight: bold; }
        .hidden { display: none !important; }
        .timer-box { font-size: 18px; font-weight: bold; color: var(--danger); margin-bottom: 15px; }
        .progress-bar { font-size: 14px; color: #6b7280; margin-bottom: 10px; }
        .score-text { font-size: 22px; font-weight: bold; margin: 20px 0; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; max-height: 380px; overflow-y: auto; padding: 5px; }
        .grid-container .btn { margin: 0; font-size: 14px; padding: 12px 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>✨ 12th Quiz Pro ✨</h1>

        <div id="lang-screen">
            <p style="margin-bottom: 15px; color: #4b5563;">अपना माध्यम चुनें / Select Medium:</p>
            <button class="btn" onclick="selectLanguage('hi')">Hindi Medium (हिंदी माध्यम)</button>
            <button class="btn" onclick="selectLanguage('en')">English Medium (English)</button>
        </div>

        <div id="stream-screen" class="hidden">
            <p id="stream-title" style="margin-bottom: 15px; font-weight: bold;"></p>
            <button class="btn btn-science" onclick="selectStream('science')">🔬 विज्ञान संकाय (Science)</button>
            <button class="btn btn-commerce" onclick="selectStream('commerce')">📊 वाणिज्य संकाय (Commerce)</button>
            <button class="btn btn-arts" onclick="selectStream('arts')">🎨 कला संकाय (Arts)</button>
            <button class="btn" onclick="location.reload()" style="background:#6b7280; margin-top: 20px;">⬅️ होम (Home)</button>
        </div>

        <div id="subject-screen" class="hidden">
            <p id="subject-title" style="margin-bottom: 15px; font-weight: bold; color: var(--primary); font-size: 18px;"></p>
            <div class="grid-container" id="subjects-container"></div>
            <button class="btn" onclick="backToStreams()" style="background:#6b7280; margin-top: 20px;">⬅️ पीछे जाएँ (Back)</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="progress-bar" id="progress">प्रश्न: 1 / 20</div>
            <div class="timer-box" id="timer">⏱️ समय: 20s</div>
            <h3 id="question-text" style="margin-bottom: 20px; text-align: left; line-height: 1.5;"></h3>
            <div id="options-container"></div>
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()" style="background:#10b981;">अगला प्रश्न ➡️</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2>📊 आपका रिपोर्ट कार्ड (Result)</h2>
            <div class="score-text" id="score-display"></div>
            <p id="remark" style="margin-bottom: 20px; font-weight: 500;"></p>
            <button class="btn" onclick="restartQuiz()">फिर से प्रयास करें (Restart)</button>
        </div>
    </div>

    <script src="arts.json"></script>
    <script src="app.js"></script>
</body>
</html>
