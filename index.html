<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Quiz Pro</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f3f4f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 20px; font-size: 24px; }
        .btn { display: block; width: 100%; padding: 14px; margin: 12px 0; border: none; border-radius: 8px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .option-btn { background: #e5e7eb; color: var(--dark); text-align: left; font-weight: normal; }
        .option-btn:hover { background: #d1d5db; }
        .correct { background: var(--success) !important; color: white; }
        .wrong { background: var(--danger) !important; color: white; }
        .hidden { display: none; }
        .timer-box { font-size: 18px; font-weight: bold; color: var(--danger); margin-bottom: 15px; }
        .progress-bar { font-size: 14px; color: #6b7280; margin-bottom: 10px; }
        .score-text { font-size: 22px; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>✨ 12th Quiz Pro ✨</h1>

        <div id="lang-screen">
            <p style="margin-bottom: 15px; color: #4b5563;">कृपया अपना माध्यम चुनें / Please select your medium:</p>
            <button class="btn" onclick="selectLanguage('hi')">Hindi Medium (हिंदी माध्यम)</button>
            <button class="btn" onclick="selectLanguage('en')">English Medium (English Medium)</button>
        </div>

        <div id="subject-screen" class="hidden">
            <p id="subject-title" style="margin-bottom: 15px; font-weight: bold;"></p>
            <button class="btn" onclick="startQuiz()">इतिहास (History)</button>
            <button class="btn" style="background:#9ca3af; cursor:not-allowed;" disabled>भूगोल (Geography) - Coming Soon</button>
            <button class="btn" style="background:#9ca3af; cursor:not-allowed;" disabled>राजनीति विज्ञान (Pol. Science) - Coming Soon</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="progress-bar" id="progress">प्रश्न: 1 / 20</div>
            <div class="timer-box" id="timer">⏱️ समय: 20s</div>
            <h3 id="question-text" style="margin-bottom: 20px; text-align: left; line-height: 1.5;"></h3>
            <div id="options-container"></div>
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()" style="background:#10b981;">अगला प्रश्न ➡️</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2>📊 आपका रिपोर्ट कार्ड (Result)</h2>
            <div class="score-text" id="score-display"></div>
            <p id="remark" style="margin-bottom: 20px; font-weight: 500;"></p>
            <button class="btn" onclick="restartQuiz()">फिर से प्रयास करें (Restart)</button>
        </div>
    </div>

    <script src="history.js"></script>
    <script src="app.js"></script>
</body>
</html>
