<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Quiz Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --science: #0ea5e9;
            --commerce: #f59e0b;
            --arts: #ec4899;
        }
        .btn-science { background-color: var(--science); }
        .btn-commerce { background-color: var(--commerce); }
        .btn-arts { background-color: var(--arts); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-xl rounded-2xl shadow-xl border border-gray-100 p-6 md:p-8">
        
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black text-indigo-600 tracking-tight flex items-center justify-center gap-2">
                <span>✨ 12th Quiz Pro ✨</span>
            </h1>
        </header>

        <div id="language-screen" class="space-y-4">
            <p class="text-center font-medium text-gray-500 mb-2">अपना माध्यम चुनें / Select Medium:</p>
            <button onclick="selectLanguage('hi')" class="w-full py-4 px-6 text-center text-lg font-bold bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-md transition-all transform hover:-translate-y-0.5">
                Hindi Medium (हिंदी माध्यम)
            </button>
            <button onclick="selectLanguage('en')" class="w-full py-4 px-6 text-center text-lg font-bold bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl shadow-md transition-all transform hover:-translate-y-0.5">
                English Medium (English)
            </button>
        </div>

        <div id="stream-screen" class="hidden space-y-4">
            <p id="stream-title" class="text-center font-bold text-gray-700 text-lg mb-2"></p>
            <button id="btn-science" onclick="selectStream('science')" class="btn-science w-full py-4 px-6 text-left text-lg font-bold text-white rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 flex items-center gap-3">
                🔬 विज्ञान (Science)
            </button>
            <button id="btn-commerce" onclick="selectStream('commerce')" class="btn-commerce w-full py-4 px-6 text-left text-lg font-bold text-white rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 flex items-center gap-3">
                📊 वाणिज्य (Commerce)
            </button>
            <button id="btn-arts" onclick="selectStream('arts')" class="btn-arts w-full py-4 px-6 text-left text-lg font-bold text-white rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 flex items-center gap-3">
                🎨 कला (Arts)
            </button>
        </div>

        <div id="subject-screen" class="hidden">
            <p id="subject-title" class="text-center font-bold text-indigo-600 text-lg mb-4"></p>
            <div id="subjects-container" class="grid grid-cols-1 gap-3 max-h-80 overflow-y-auto p-1">
                </div>
            <button onclick="location.reload()" class="w-full mt-6 py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-xl transition-all flex items-center justify-center gap-2">
                <i class="bi bi-arrow-left"></i> <span>पीछे जाएँ (Back)</span>
            </button>
        </div>

        <div id="quiz-screen" class="hidden space-y-6">
            <div class="flex items-center justify-between text-sm font-semibold text-gray-500 mb-1">
                <span id="question-counter">प्रश्न 1/20</span>
            </div>
            
            <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-600 transition-all duration-300" style="width: 0%"></div>
            </div>

            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5">
                <h3 id="question-text" class="text-lg font-bold text-gray-800 leading-relaxed"></h3>
            </div>

            <div id="options-container" class="space-y-3">
                </div>

            <div class="flex items-center gap-3 pt-2">
                <button id="prev-btn" onclick="prevQuestion()" class="flex-1 py-3.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-xl transition-all hidden">
                    <i class="bi bi-chevron-left"></i> पिछला
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="flex-1 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:pointer-events-none text-white font-bold rounded-xl shadow-md transition-all" disabled>
                    अगला <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center space-y-6 py-4">
            <div id="result-icon"></div>
            
            <h2 class="text-2xl font-black text-gray-800 tracking-tight">📊 आपका रिपोर्ट कार्ड</h2>
            <p id="result-status"></p>

            <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <div class="text-center p-2">
                    <p id="txt-score-label" class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1"></p>
                    <p id="result-score" class="text-2xl font-black text-indigo-600"></p>
                </div>
                <div class="text-center p-2">
                    <p id="txt-percent-label" class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1"></p>
                    <p id="result-percentage" class="text-2xl font-black text-indigo-600"></p>
                </div>
            </div>

            <button id="btn-restart" onclick="restartQuiz()" class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg rounded-xl shadow-md transition-all transform hover:-translate-y-0.5">
                फिर से प्रयास करें
            </button>
        </div>

    </div>

    <script src="history.js"></script>
    <script src="app.js"></script>
</body>
</html>
