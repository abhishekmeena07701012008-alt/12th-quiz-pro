<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>12th Quiz Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="app">
        <!-- स्टेप 1: भाषा -->
        <div id="lang-screen">
            <h1>भाषा चुनें / Select Language</h1>
            <button class="btn" onclick="setLanguage('hi')">हिंदी (Hindi)</button>
            <button class="btn" onclick="setLanguage('en')">English</button>
        </div>
        <!-- स्टेप 2: विषय (ये खुद डेटाबेस से लोड होंगे) -->
        <div id="sub-screen" class="hidden">
            <h1>विषय चुनें / Select Subject</h1>
            <div id="sub-list"></div>
        </div>
        <!-- स्टेप 3: क्विज़ -->
        <div id="quiz-screen" class="hidden">
            <h3 id="subject-name"></h3>
            <h2 id="question"></h2>
            <div id="options"></div>
        </div>
    </div>
    <script src="history (1).js"></script>
    <script src="app.js"></script>
</body>
</html>
