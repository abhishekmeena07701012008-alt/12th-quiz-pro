<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>12th Quiz Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: #6366f1; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #4f46e5; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; }
        .correct { background: #22c55e !important; color: white; border-color: #22c55e; }
        .wrong { background: #ef4444 !important; color: white; border-color: #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div id="lang-screen">
            <h1>भाषा चुनें / Select Language</h1>
            <button class="btn" onclick="selectLang('hi')">हिंदी (Hindi)</button>
            <button class="btn" onclick="selectLang('en')">English</button>
        </div>
        <div id="sub-screen" class="hidden">
            <h1>विषय चुनें</h1>
            <div id="sub-list"></div>
        </div>
        <div id="quiz-screen" class="hidden">
            <h3 id="subject-name"></h3>
            <h2 id="question"></h2>
            <div id="options"></div>
        </div>
    </div>
    <script src="history (1).js"></script>
    <script src="app.js"></script>
</body>
</html>
